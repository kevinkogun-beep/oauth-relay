<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Drive 인증</title></head>
<body>
<p id="msg" style="font-family:sans-serif;padding:30px;font-size:16px;">인증 처리 중...</p>
<script>
(function(){
  var el = document.getElementById('msg');
  var p = new URLSearchParams(window.location.search);
  var code = p.get('code');
  var error = p.get('error');

  if(error){
    el.innerHTML = '❌ 오류: <b>' + error + '</b>';
    return;
  }
  if(!code){
    el.innerHTML = '⚠️ 코드 없음<br><small>URL: ' + window.location.href + '</small>';
    return;
  }
  if(window.opener){
    window.opener.postMessage({type:'gauth_code', code:code}, '*');
    el.innerHTML = '✅ 인증 완료! 창이 자동으로 닫힙니다.';
    setTimeout(function(){window.close();},1500);
  } else {
    el.innerHTML = '⚠️ window.opener 없음 — 팝업 차단 확인';
  }
})();
</script>
</body>
</html>
